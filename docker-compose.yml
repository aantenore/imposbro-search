services:
  kafka:
    image: bitnamilegacy/kafka:4.0.0
    ports:
      - '${HOST_BIND_IP:-127.0.0.1}:9092:9092'
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: 'controller,broker'
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: '0@kafka:9093'
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CFG_LISTENERS: 'INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093'
      KAFKA_CFG_ADVERTISED_LISTENERS: 'INTERNAL://kafka:29092,EXTERNAL://localhost:9092'
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
    volumes:
      - kafka_data:/bitnami/kafka

  redis:
    image: redis:7-alpine
    ports:
      - '${HOST_BIND_IP:-127.0.0.1}:6379:6379'
    volumes:
      - redis_data:/data

  # --- Internal HA Cluster for Application State ---
  typesense-state-1:
    image: typesense/typesense:0.25.2
    environment:
      - TYPESENSE_API_KEY=${INTERNAL_STATE_API_KEY}
      - TYPESENSE_DATA_DIR=/data
      - GLOG_logtostderr=1
    command: '--nodes=/app/typesense-nodes-internal --api-key=${INTERNAL_STATE_API_KEY}'
    volumes:
      - typesense_data_state_1:/data
      - ./typesense-nodes-internal:/app/typesense-nodes-internal
    networks:
      default:
        ipv4_address: ${TYPESENSE_STATE_1_IP:-172.28.0.11}
  typesense-state-2:
    image: typesense/typesense:0.25.2
    environment:
      - TYPESENSE_API_KEY=${INTERNAL_STATE_API_KEY}
      - TYPESENSE_DATA_DIR=/data
      - GLOG_logtostderr=1
    command: '--nodes=/app/typesense-nodes-internal --api-key=${INTERNAL_STATE_API_KEY}'
    volumes:
      - typesense_data_state_2:/data
      - ./typesense-nodes-internal:/app/typesense-nodes-internal
    networks:
      default:
        ipv4_address: ${TYPESENSE_STATE_2_IP:-172.28.0.12}
  typesense-state-3:
    image: typesense/typesense:0.25.2
    environment:
      - TYPESENSE_API_KEY=${INTERNAL_STATE_API_KEY}
      - TYPESENSE_DATA_DIR=/data
      - GLOG_logtostderr=1
    command: '--nodes=/app/typesense-nodes-internal --api-key=${INTERNAL_STATE_API_KEY}'
    volumes:
      - typesense_data_state_3:/data
      - ./typesense-nodes-internal:/app/typesense-nodes-internal
    networks:
      default:
        ipv4_address: ${TYPESENSE_STATE_3_IP:-172.28.0.13}

  # --- Default Federated Cluster 1 for User Data ---
  typesense-data-1:
    image: typesense/typesense:0.25.2
    environment:
      - TYPESENSE_API_KEY=${DEFAULT_DATA_CLUSTER_API_KEY}
      - TYPESENSE_DATA_DIR=/data
      - GLOG_logtostderr=1
    command: '--nodes=/app/typesense-nodes-data --api-key=${DEFAULT_DATA_CLUSTER_API_KEY}'
    volumes:
      - typesense_data_default_1:/data
      - ./typesense-nodes-data:/app/typesense-nodes-data
    networks:
      default:
        ipv4_address: ${TYPESENSE_DATA_1_IP:-172.28.0.21}
  typesense-data-2:
    image: typesense/typesense:0.25.2
    environment:
      - TYPESENSE_API_KEY=${DEFAULT_DATA_CLUSTER_API_KEY}
      - TYPESENSE_DATA_DIR=/data
      - GLOG_logtostderr=1
    command: '--nodes=/app/typesense-nodes-data --api-key=${DEFAULT_DATA_CLUSTER_API_KEY}'
    volumes:
      - typesense_data_default_2:/data
      - ./typesense-nodes-data:/app/typesense-nodes-data
    networks:
      default:
        ipv4_address: ${TYPESENSE_DATA_2_IP:-172.28.0.22}
  typesense-data-3:
    image: typesense/typesense:0.25.2
    environment:
      - TYPESENSE_API_KEY=${DEFAULT_DATA_CLUSTER_API_KEY}
      - TYPESENSE_DATA_DIR=/data
      - GLOG_logtostderr=1
    command: '--nodes=/app/typesense-nodes-data --api-key=${DEFAULT_DATA_CLUSTER_API_KEY}'
    volumes:
      - typesense_data_default_3:/data
      - ./typesense-nodes-data:/app/typesense-nodes-data
    networks:
      default:
        ipv4_address: ${TYPESENSE_DATA_3_IP:-172.28.0.23}

  # --- NEW: Second Federated Cluster for User Data ---
  typesense-data2-1:
    image: typesense/typesense:0.25.2
    environment:
      - TYPESENSE_API_KEY=${DEFAULT_DATA2_CLUSTER_API_KEY}
      - TYPESENSE_DATA_DIR=/data
      - GLOG_logtostderr=1
    command: '--nodes=/app/typesense-nodes-data2 --api-key=${DEFAULT_DATA2_CLUSTER_API_KEY}'
    volumes:
      - typesense_data_default2_1:/data
      - ./typesense-nodes-data2:/app/typesense-nodes-data2
    networks:
      default:
        ipv4_address: ${TYPESENSE_DATA2_1_IP:-172.28.0.31}
  typesense-data2-2:
    image: typesense/typesense:0.25.2
    environment:
      - TYPESENSE_API_KEY=${DEFAULT_DATA2_CLUSTER_API_KEY}
      - TYPESENSE_DATA_DIR=/data
      - GLOG_logtostderr=1
    command: '--nodes=/app/typesense-nodes-data2 --api-key=${DEFAULT_DATA2_CLUSTER_API_KEY}'
    volumes:
      - typesense_data_default2_2:/data
      - ./typesense-nodes-data2:/app/typesense-nodes-data2
    networks:
      default:
        ipv4_address: ${TYPESENSE_DATA2_2_IP:-172.28.0.32}
  typesense-data2-3:
    image: typesense/typesense:0.25.2
    environment:
      - TYPESENSE_API_KEY=${DEFAULT_DATA2_CLUSTER_API_KEY}
      - TYPESENSE_DATA_DIR=/data
      - GLOG_logtostderr=1
    command: '--nodes=/app/typesense-nodes-data2 --api-key=${DEFAULT_DATA2_CLUSTER_API_KEY}'
    volumes:
      - typesense_data_default2_3:/data
      - ./typesense-nodes-data2:/app/typesense-nodes-data2
    networks:
      default:
        ipv4_address: ${TYPESENSE_DATA2_3_IP:-172.28.0.33}

  query_api:
    build: ./query_api
    ports:
      - '${HOST_BIND_IP:-127.0.0.1}:8000:8000'
    depends_on:
      - kafka
      - redis
      - typesense-state-1
      - typesense-state-2
      - typesense-state-3
      - typesense-data-1
      - typesense-data-2
      - typesense-data-3
      - typesense-data2-1
      - typesense-data2-2
      - typesense-data2-3
    env_file: .env

  indexing_service:
    build: ./indexing_service
    ports:
      - '${HOST_BIND_IP:-127.0.0.1}:9108:9108'
    depends_on:
      query_api:
        condition: service_started
    env_file: .env

  admin_ui:
    build:
      context: ./admin_ui
      args:
        - INTERNAL_QUERY_API_URL=${INTERNAL_QUERY_API_URL}
    ports:
      - '${HOST_BIND_IP:-127.0.0.1}:3001:3000'
    depends_on:
      - query_api
    env_file: .env

  prometheus:
    image: prom/prometheus:v3.6.0
    ports: ['${HOST_BIND_IP:-127.0.0.1}:9090:9090']
    volumes: ['./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml']
    command: --config.file=/etc/prometheus/prometheus.yml
    depends_on: [query_api, indexing_service]

  grafana:
    image: grafana/grafana:12.2.0
    ports: ['${HOST_BIND_IP:-127.0.0.1}:3000:3000']
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-me-local-only}
    depends_on: [prometheus]

volumes:
  kafka_data:
  redis_data:
  typesense_data_state_1:
  typesense_data_state_2:
  typesense_data_state_3:
  typesense_data_default_1:
  typesense_data_default_2:
  typesense_data_default_3:
  # NEW: Volumes for the second data cluster
  typesense_data_default2_1:
  typesense_data_default2_2:
  typesense_data_default2_3:

networks:
  default:
    ipam:
      config:
        - subnet: ${COMPOSE_SUBNET:-172.28.0.0/16}
