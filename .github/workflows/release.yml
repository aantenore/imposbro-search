name: Signed container release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: SemVer image tag (for example v1.2.3)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate immutable release intent
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      component-matrix: ${{ steps.components.outputs.matrix }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate release tag
        run: scripts/ci/validate-release-tag.sh "$RELEASE_TAG"
      - name: Load validated release component inventory
        id: components
        run: |
          matrix="$(python3 scripts/ci/release-matrix.py)"
          printf 'matrix=%s\n' "$matrix" >> "$GITHUB_OUTPUT"

  quality-gate:
    name: Reuse enterprise quality gate
    needs: validate-release
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  enterprise-assurance:
    name: Reuse exact-commit enterprise assurance
    needs: validate-release
    uses: ./.github/workflows/enterprise-assurance.yml
    permissions:
      contents: read

  release-metadata:
    name: Package changelog and rollback contract
    needs: validate-release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate release documentation
        run: |
          test -s CHANGELOG.md
          test -s docs/RELEASE_ROLLBACK.md
          mkdir -p artifacts
          cp CHANGELOG.md artifacts/CHANGELOG.md
          cp docs/RELEASE_ROLLBACK.md artifacts/RELEASE_ROLLBACK.md
          sha256sum artifacts/CHANGELOG.md | cut -d' ' -f1 > artifacts/CHANGELOG.sha256
          sha256sum artifacts/RELEASE_ROLLBACK.md | cut -d' ' -f1 > artifacts/RELEASE_ROLLBACK.sha256
      - name: Retain release documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: release-metadata-${{ env.RELEASE_TAG }}
          path: artifacts/
          retention-days: 90

  publish:
    name: Build, attest, and sign (${{ matrix.component }})
    needs:
      - enterprise-assurance
      - quality-gate
      - validate-release
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.validate-release.outputs.component-matrix) }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate release tag
        run: scripts/ci/validate-release-tag.sh "$RELEASE_TAG"
      - name: Compute canonical image name
        id: image
        env:
          COMPONENT: ${{ matrix.component }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY}/${COMPONENT}"
          printf 'name=%s\n' "${image,,}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Authenticate to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Reject release tag replacement
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          if docker buildx imagetools inspect "${IMAGE_NAME}:${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Refusing to overwrite existing release ${IMAGE_NAME}:${RELEASE_TAG}" >&2
            exit 1
          fi
      - name: Derive OCI metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: type=raw,value=staging-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          context: ${{ matrix.context }}
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: linux/amd64
          provenance: mode=max
          pull: true
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
      - name: Prepare SBOM output directory
        run: mkdir -p artifacts
      - name: Generate SPDX 2.3 SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          image: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
          output-file: artifacts/${{ matrix.component }}.spdx.json
          syft-version: v1.42.3
          upload-artifact: false
          upload-release-assets: false
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: cyclonedx-json
          image: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
          output-file: artifacts/${{ matrix.component }}.cdx.json
          syft-version: v1.42.3
          upload-artifact: false
          upload-release-assets: false
      - name: Attest build provenance with GitHub OIDC
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          create-storage-record: false
          push-to-registry: true
          subject-digest: ${{ steps.build.outputs.digest }}
          subject-name: ${{ steps.image.outputs.name }}
      - name: Attest SPDX SBOM with GitHub OIDC
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          create-storage-record: false
          push-to-registry: true
          sbom-path: artifacts/${{ matrix.component }}.spdx.json
          subject-digest: ${{ steps.build.outputs.digest }}
          subject-name: ${{ steps.image.outputs.name }}
      - name: Attest CycloneDX SBOM with GitHub OIDC
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          create-storage-record: false
          push-to-registry: true
          sbom-path: artifacts/${{ matrix.component }}.cdx.json
          subject-digest: ${{ steps.build.outputs.digest }}
          subject-name: ${{ steps.image.outputs.name }}
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Sign image keylessly and verify signature
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          subject="${IMAGE_NAME}@${IMAGE_DIGEST}"
          identity="https://github.com/${GITHUB_WORKFLOW_REF}"
          cosign sign --yes "$subject"
          cosign verify \
            --certificate-identity "$identity" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$subject"
      - name: Verify GitHub provenance attestation
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: >-
          gh attestation verify
          "oci://${IMAGE_NAME}@${IMAGE_DIGEST}"
          --repo "$GITHUB_REPOSITORY"
      - name: Record immutable release descriptor
        env:
          COMPONENT: ${{ matrix.component }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          printf '%s\n' "$IMAGE_NAME" > "artifacts/${COMPONENT}.image.txt"
          printf '%s\n' "$IMAGE_DIGEST" > "artifacts/${COMPONENT}.digest.txt"
          sha256sum "artifacts/${COMPONENT}.spdx.json" | cut -d' ' -f1 > "artifacts/${COMPONENT}.spdx.sha256"
          sha256sum "artifacts/${COMPONENT}.cdx.json" | cut -d' ' -f1 > "artifacts/${COMPONENT}.cdx.sha256"
      - name: Retain SBOM evidence before promotion
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: sbom-${{ matrix.component }}-${{ env.RELEASE_TAG }}
          path: artifacts/
          retention-days: 90

  promote:
    name: Promote complete verified component set
    needs:
      - publish
      - release-metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Authenticate to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Download complete SBOM and descriptor set
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
          path: artifacts
          pattern: sbom-*-${{ env.RELEASE_TAG }}
      - name: Download changelog and rollback metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          name: release-metadata-${{ env.RELEASE_TAG }}
      - name: Reverify every component before promotion
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for document in CHANGELOG RELEASE_ROLLBACK; do
            expected_hash="$(<"artifacts/${document}.sha256")"
            actual_hash="$(sha256sum "artifacts/${document}.md" | cut -d' ' -f1)"
            if [[ ! "$expected_hash" =~ ^[0-9a-f]{64}$ || "$actual_hash" != "$expected_hash" ]]; then
              echo "Release document hash mismatch: ${document}.md" >&2
              exit 1
            fi
          done
          identity="https://github.com/${GITHUB_WORKFLOW_REF}"
          repository="${GITHUB_REPOSITORY,,}"
          mapfile -t components < <(
            find artifacts -maxdepth 1 -name '*.image.txt' -print \
              | sed -E 's#^.*/##; s#\.image\.txt$##' \
              | sort
          )
          if (( ${#components[@]} == 0 )); then
            echo "No release component descriptors were downloaded" >&2
            exit 1
          fi
          for component in "${components[@]}"; do
            image_name="$(<"artifacts/${component}.image.txt")"
            image_digest="$(<"artifacts/${component}.digest.txt")"
            expected_name="ghcr.io/${repository}/${component}"
            if [[ "$image_name" != "$expected_name" ]]; then
              echo "Unexpected image name for $component: $image_name" >&2
              exit 1
            fi
            if [[ ! "$image_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Invalid digest for $component: $image_digest" >&2
              exit 1
            fi
            for format in spdx cdx; do
              expected_sbom_hash="$(<"artifacts/${component}.${format}.sha256")"
              actual_sbom_hash="$(sha256sum "artifacts/${component}.${format}.json" | cut -d' ' -f1)"
              if [[ "$actual_sbom_hash" != "$expected_sbom_hash" ]]; then
                echo "SBOM hash mismatch for ${component}.${format}.json" >&2
                exit 1
              fi
            done
            if docker buildx imagetools inspect "${image_name}:${RELEASE_TAG}" >/dev/null 2>&1; then
              echo "Refusing to overwrite existing release ${image_name}:${RELEASE_TAG}" >&2
              exit 1
            fi
            if docker buildx imagetools inspect "${image_name}:sha-${GITHUB_SHA}" >/dev/null 2>&1; then
              existing_sha_digest="sha256:$(docker buildx imagetools inspect "${image_name}:sha-${GITHUB_SHA}" --raw | sha256sum | cut -d' ' -f1)"
              if [[ "$existing_sha_digest" != "$image_digest" ]]; then
                echo "Refusing to replace commit tag with a different digest for $component" >&2
                exit 1
              fi
            fi
            cosign verify \
              --certificate-identity "$identity" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "${image_name}@${image_digest}"
            gh attestation verify \
              "oci://${image_name}@${image_digest}" \
              --repo "$GITHUB_REPOSITORY"
          done
      - name: Create complete platform release manifest
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path("artifacts")
          images = {}
          components = sorted(
              path.name.removesuffix(".image.txt")
              for path in root.glob("*.image.txt")
          )
          if not components:
              raise SystemExit("No release component descriptors were downloaded")
          for component in components:
              images[component] = {
                  "name": (root / f"{component}.image.txt").read_text().strip(),
                  "digest": (root / f"{component}.digest.txt").read_text().strip(),
                  "sbom": {
                      "cyclonedx": {
                          "file": f"{component}.cdx.json",
                          "sha256": (root / f"{component}.cdx.sha256").read_text().strip(),
                      },
                      "spdx": {
                          "file": f"{component}.spdx.json",
                          "sha256": (root / f"{component}.spdx.sha256").read_text().strip(),
                      },
                  },
              }
          manifest = {
              "schema_version": 1,
              "release_tag": os.environ["RELEASE_TAG"],
              "source_commit": os.environ["GITHUB_SHA"],
              "source_repository": os.environ["GITHUB_REPOSITORY"],
              "images": images,
              "release_documents": {
                  "changelog": {
                      "file": "CHANGELOG.md",
                      "sha256": (root / "CHANGELOG.sha256").read_text().strip(),
                  },
                  "rollback": {
                      "file": "RELEASE_ROLLBACK.md",
                      "sha256": (root / "RELEASE_ROLLBACK.sha256").read_text().strip(),
                  },
              },
          }
          (root / "release-manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Attest complete platform release manifest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: artifacts/release-manifest.json
      - name: Retain complete release manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: release-manifest-${{ env.RELEASE_TAG }}
          path: artifacts/release-manifest.json
          retention-days: 90
      - name: Promote verified digests to immutable release tags
        run: |
          mapfile -t components < <(
            find artifacts -maxdepth 1 -name '*.image.txt' -print \
              | sed -E 's#^.*/##; s#\.image\.txt$##' \
              | sort
          )
          for component in "${components[@]}"; do
            image_name="$(<"artifacts/${component}.image.txt")"
            image_digest="$(<"artifacts/${component}.digest.txt")"
            docker buildx imagetools create \
              --tag "${image_name}:${RELEASE_TAG}" \
              --tag "${image_name}:sha-${GITHUB_SHA}" \
              "${image_name}@${image_digest}"
            resolved="sha256:$(docker buildx imagetools inspect "${image_name}:${RELEASE_TAG}" --raw | sha256sum | cut -d' ' -f1)"
            if [[ "$resolved" != "$image_digest" ]]; then
              echo "Promoted digest mismatch for $component: expected $image_digest, resolved $resolved" >&2
              exit 1
            fi
          done
