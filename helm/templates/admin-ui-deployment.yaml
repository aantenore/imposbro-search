apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "imposbro-search.fullname" . }}-admin-ui
  labels:
    {{- include "imposbro-search.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin-ui
spec:
  revisionHistoryLimit: {{ .Values.adminUi.revisionHistoryLimit }}
  minReadySeconds: {{ .Values.adminUi.minReadySeconds }}
  strategy:
    {{- toYaml .Values.adminUi.strategy | nindent 4 }}
  {{- if not .Values.adminUi.autoscaling.enabled }}
  replicas: {{ .Values.adminUi.replicaCount | default .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "imposbro-search.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: admin-ui
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.config.useSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- else }}
        checksum/secret-source: {{ include "imposbro-search.secretSourceChecksum" . }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "imposbro-search.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: admin-ui
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "imposbro-search.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      enableServiceLinks: false
      terminationGracePeriodSeconds: {{ .Values.adminUi.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.adminUi.name }}
          image: "{{ include "imposbro-search.requiredImage" (dict "name" "adminUi.image" "value" .Values.adminUi.image) }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.adminUi.port }}
              protocol: TCP
          {{- with .Values.adminUi.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.adminUi.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.adminUi.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- include "imposbro-search.secretEnv" (dict "root" . "keys" .Values.secrets.workloadKeys.adminUi) | nindent 12 }}
            {{- if .Values.tls.trustBundle.enabled }}
            - name: NODE_EXTRA_CA_CERTS
              value: {{ printf "%s/ca.crt" .Values.tls.trustBundle.mountPath | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "imposbro-search.fullname" . }}-config
          {{- if or .Values.writableTmpDir.enabled .Values.tls.trustBundle.enabled }}
          volumeMounts:
            {{- if .Values.writableTmpDir.enabled }}
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache
            {{- end }}
            {{- if .Values.tls.trustBundle.enabled }}
            - name: trust-bundle
              mountPath: {{ .Values.tls.trustBundle.mountPath | quote }}
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.writableTmpDir.enabled .Values.tls.trustBundle.enabled }}
      volumes:
        {{- if .Values.writableTmpDir.enabled }}
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.writableTmpDir.sizeLimit | quote }}
        - name: next-cache
          emptyDir:
            sizeLimit: {{ .Values.writableTmpDir.sizeLimit | quote }}
        {{- end }}
        {{- if .Values.tls.trustBundle.enabled }}
        - name: trust-bundle
          secret:
            secretName: {{ .Values.tls.trustBundle.existingSecret | quote }}
            optional: false
            items:
              - key: {{ .Values.tls.trustBundle.caKey | quote }}
                path: ca.crt
              {{- range .Values.tls.trustBundle.additionalKeys }}
              - key: {{ .key | quote }}
                path: {{ .path | quote }}
              {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.affinity .Values.availability.podAntiAffinity.enabled }}
      affinity:
        {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.availability.podAntiAffinity.enabled }}
        {{- include "imposbro-search.podAntiAffinity" (dict "root" . "component" "admin-ui") | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.adminUi.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
