# Optional: use this Secret for sensitive config in production.
# In production, prefer injecting secrets from an external secret manager
# (e.g. Sealed Secrets, External Secrets Operator) rather than storing
# raw values in values.yaml.
#
# To use: set config.useSecret: true in values and ensure the keys below
# are set via --set or a secure values file. Deployments will need
# envFrom: secretRef to use this secret.
{{- if .Values.config.useSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "imposbro-search.fullname" . }}-secret
  labels:
    {{- include "imposbro-search.labels" . | nindent 4 }}
type: Opaque
stringData:
  INTERNAL_STATE_API_KEY: {{ .Values.config.INTERNAL_STATE_API_KEY | quote }}
  DEFAULT_DATA_CLUSTER_API_KEY: {{ .Values.config.DEFAULT_DATA_CLUSTER_API_KEY | quote }}
  DEFAULT_DATA2_CLUSTER_API_KEY: {{ .Values.config.DEFAULT_DATA2_CLUSTER_API_KEY | quote }}
  REDIS_URL: {{ .Values.config.REDIS_URL | quote }}
  {{- if .Values.config.ADMIN_API_KEY }}
  ADMIN_API_KEY: {{ .Values.config.ADMIN_API_KEY | quote }}
  {{- end }}
  {{- if .Values.config.DATA_API_KEY }}
  DATA_API_KEY: {{ .Values.config.DATA_API_KEY | quote }}
  {{- end }}
  {{- if .Values.config.INTERNAL_QUERY_API_ADMIN_API_KEY }}
  INTERNAL_QUERY_API_ADMIN_API_KEY: {{ .Values.config.INTERNAL_QUERY_API_ADMIN_API_KEY | quote }}
  {{- end }}
  {{- if .Values.config.INTERNAL_QUERY_API_DATA_API_KEY }}
  INTERNAL_QUERY_API_DATA_API_KEY: {{ .Values.config.INTERNAL_QUERY_API_DATA_API_KEY | quote }}
  {{- end }}
  {{- if .Values.config.SCOPED_API_KEYS }}
  SCOPED_API_KEYS: {{ include "imposbro-search.scopedApiKeysJson" . | quote }}
  {{- end }}
  {{- if .Values.config.ADMIN_UI_PROXY_TRUSTED_VALUE }}
  ADMIN_UI_PROXY_TRUSTED_VALUE: {{ .Values.config.ADMIN_UI_PROXY_TRUSTED_VALUE | quote }}
  {{- end }}
  {{- if .Values.config.ADMIN_UI_OIDC_CLIENT_SECRET }}
  ADMIN_UI_OIDC_CLIENT_SECRET: {{ .Values.config.ADMIN_UI_OIDC_CLIENT_SECRET | quote }}
  {{- end }}
  {{- if .Values.config.ADMIN_UI_SESSION_SECRET }}
  ADMIN_UI_SESSION_SECRET: {{ .Values.config.ADMIN_UI_SESSION_SECRET | quote }}
  {{- end }}
{{- end }}
