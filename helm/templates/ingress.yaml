  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.adminUi.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- with .Values.adminUi.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.adminUi.ingress.hosts }}
    {{- $host := required "adminUi.ingress.hosts[].host is required when adminUi.ingress.enabled is true" .host }}
    - host: {{ $host | quote }}
      http:
        paths:
          - path: {{ default "/" .path | quote }}
