{{- include "imposbro-search.validateConfig" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "imposbro-search.fullname" . }}-config
  labels:
    {{- include "imposbro-search.labels" . | nindent 4 }}
data:
  KAFKA_BROKER_URL: {{ .Values.config.KAFKA_BROKER_URL | quote }}
  KAFKA_TOPIC_PREFIX: {{ .Values.config.KAFKA_TOPIC_PREFIX | quote }}
  KAFKA_METADATA_MAX_AGE_MS: {{ .Values.config.KAFKA_METADATA_MAX_AGE_MS | quote }}
  INDEXING_MAX_PROCESSING_ATTEMPTS: {{ .Values.config.INDEXING_MAX_PROCESSING_ATTEMPTS | quote }}
  INDEXING_METRICS_ENABLED: {{ .Values.config.INDEXING_METRICS_ENABLED | quote }}
  INDEXING_METRICS_PORT: {{ .Values.config.INDEXING_METRICS_PORT | quote }}
  REDIS_URL: {{ .Values.config.REDIS_URL | quote }}
  CONFIG_SYNC_SOURCE_ID: {{ .Values.config.CONFIG_SYNC_SOURCE_ID | quote }}
  INTERNAL_STATE_NODES: {{ .Values.config.INTERNAL_STATE_NODES | quote }}
  DEFAULT_DATA_CLUSTER_NODES: {{ .Values.config.DEFAULT_DATA_CLUSTER_NODES | quote }}
  DEFAULT_DATA2_CLUSTER_NODES: {{ .Values.config.DEFAULT_DATA2_CLUSTER_NODES | quote }}
  INTERNAL_QUERY_API_URL: {{ .Values.config.INTERNAL_QUERY_API_URL | quote }}
  CORS_ORIGINS: {{ .Values.config.CORS_ORIGINS | quote }}
  ALLOW_UNAUTHENTICATED_ADMIN: {{ .Values.config.ALLOW_UNAUTHENTICATED_ADMIN | quote }}
  ALLOW_UNAUTHENTICATED_DATA: {{ .Values.config.ALLOW_UNAUTHENTICATED_DATA | quote }}
  ADMIN_UI_PROXY_TRUSTED_HEADER: {{ .Values.config.ADMIN_UI_PROXY_TRUSTED_HEADER | quote }}
