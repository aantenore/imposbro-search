# values.yaml

# Global values
replicaCount: 1
imagePullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

networkPolicy:
  enabled: false
  # Sources shared by browser-facing workloads, usually an authenticated
  # Ingress controller, API gateway, service mesh ingress, or load balancer.
  ingressController:
    from: []
  # Sources allowed to scrape indexing-service metrics.
  prometheus:
    from: []
  queryApi:
    # Allow the Admin UI pods from this release to call the Query API service.
    allowAdminUi: true
    ingress:
      from: []
    # Optional Kubernetes NetworkPolicy egress rules. Leave empty to avoid
    # enforcing egress until Kafka, Redis, DNS, and Typesense destinations are
    # explicitly modeled for the target cluster.
    egress: []
  adminUi:
    ingress:
      from: []
    egress: []
  indexingService:
    metrics:
      ingress:
        from: []
    egress: []

monitoring:
  serviceMonitor:
    enabled: false
    namespace: ""
    labels: {}
    namespaceSelector: {}
    interval: 30s
    scrapeTimeout: 10s
    targetLabels: []
    podTargetLabels: []
    queryApi:
      enabled: true
      path: /metrics
    indexingService:
      enabled: true
      path: /metrics
  prometheusRule:
    enabled: false
    namespace: ""
    labels: {}
    rules:
      queryApiHigh5xxRate:
        enabled: true
        severity: warning
        threshold: 0.05
        duration: 10m
      queryApiHighP95Latency:
        enabled: true
        severity: warning
        thresholdSeconds: 1
        duration: 10m
      queryApiRateLimitBlocked:
        enabled: true
        severity: warning
        threshold: 50
        window: 5m
      queryApiRateLimitBackendErrors:
        enabled: true
        severity: critical
        threshold: 0
        window: 5m
      indexingDlqMessages:
        enabled: true
        severity: critical
        threshold: 0
        window: 5m
      indexingRetryBurst:
        enabled: true
        severity: warning
        threshold: 10
        window: 10m
      indexingNoLoadedClusters:
        enabled: true
        severity: critical
        duration: 5m

# Configuration for the query-api service
queryApi:
  name: query-api
  # Required: set to an immutable digest-pinned reference, for example
  # registry.example.com/imposbro-query-api@sha256:<64 hex chars>.
  image: ""
  replicaCount: 1
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
    maxUnavailable: ""
  port: 8000
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    # Example:
    # - host: api.example.com
    #   path: /
    #   pathType: Prefix
    tls: []
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: ""
    behavior: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  startupProbe:
    httpGet:
      path: /ready
      port: http
    failureThreshold: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  topologySpreadConstraints: []

# Configuration for the admin-ui service
adminUi:
  name: admin-ui
  # Required: set to an immutable digest-pinned reference, for example
  # registry.example.com/imposbro-admin-ui@sha256:<64 hex chars>.
  image: ""
  replicaCount: 1
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
    maxUnavailable: ""
  port: 3000
  service:
    type: ClusterIP # Expose through an authenticated Ingress or gateway in production
    port: 80
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    # Example:
    # - host: admin.example.com
    #   path: /
    #   pathType: Prefix
    tls: []
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: ""
    behavior: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  topologySpreadConstraints: []

# Configuration for the indexing-service (Kafka consumer)
indexingService:
  name: indexing-service
  # Required: set to an immutable digest-pinned reference, for example
  # registry.example.com/imposbro-indexing-service@sha256:<64 hex chars>.
  image: ""
  replicaCount: 1
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
    maxUnavailable: ""
  metrics:
    enabled: true
    port: 9108
    service:
      enabled: true
      type: ClusterIP
      port: 9108
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: ""
    behavior: {}
  keda:
    enabled: false
    minReplicaCount: 1
    maxReplicaCount: 10
    pollingInterval: 30
    cooldownPeriod: 300
    kafka:
      # Defaults to config.KAFKA_BROKER_URL when empty.
      bootstrapServers: ""
      consumerGroup: imposbro_federated_indexing_group
      # Leave empty to let KEDA calculate lag across all topics known to the consumer group.
      topic: ""
      lagThreshold: "50"
      activationLagThreshold: "0"
      offsetResetPolicy: latest
      allowIdleConsumers: "false"
      limitToPartitionsWithLag: "false"
      ensureEvenDistributionOfPartitions: "false"
      version: "1.0.0"
      sasl: ""
      tls: ""
      unsafeSsl: ""
    authenticationRef:
      name: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Workers do not expose an HTTP health endpoint by default.
  # Provide probes here if you wrap the worker with a process-level healthcheck.
  livenessProbe: {}
  topologySpreadConstraints: []

# Configuration for backend services (Kafka, Typesense, Redis)
# For a production setup, these should come from external Helm charts (as dependencies)
# or be managed services from your cloud provider.
kafka:
  name: kafka
  port: 9092

typesense:
  name: typesense
  port: 8108
  replica:
    name: typesense-replica
    port: 8108

redis:
  name: redis
  port: 6379

# Centralized configuration for environment variables.
# This chart deploys the IMPOSBRO applications only. Kafka, Redis, and
# Typesense must be deployed separately and provided here explicitly.
config:
  useSecret: false  # Must be true unless you customize external secret injection.
  KAFKA_BROKER_URL: ""
  KAFKA_TOPIC_PREFIX: "imposbro_search_sharded"
  KAFKA_METADATA_MAX_AGE_MS: "5000"
  INDEXING_MAX_PROCESSING_ATTEMPTS: "3"
  INDEXING_METRICS_ENABLED: "true"
  INDEXING_METRICS_PORT: "9108"
  REDIS_URL: ""
  CONFIG_SYNC_SOURCE_ID: "" # Optional; defaults to hostname:pid so replicas ignore only their own Redis notifications
  INTERNAL_STATE_NODES: ""
  DEFAULT_DATA_CLUSTER_NODES: ""
  DEFAULT_DATA2_CLUSTER_NODES: ""
  INTERNAL_QUERY_API_URL: ""
  CORS_ORIGINS: ""
  REQUEST_ID_HEADER: "X-Request-ID"
  ALLOW_UNAUTHENTICATED_ADMIN: "false"
  ALLOW_UNAUTHENTICATED_DATA: "false"
  INGEST_BATCH_MAX_DOCUMENTS: "100"
  RATE_LIMIT_ENABLED: "false"
  RATE_LIMIT_BACKEND: "redis"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  RATE_LIMIT_SEARCH_REQUESTS: "120"
  RATE_LIMIT_INGEST_REQUESTS: "60"
  RATE_LIMIT_FAIL_CLOSED: "false"
  RATE_LIMIT_REDIS_PREFIX: "imposbro:rate_limit"
  # For production: use Secrets (config.useSecret: true) and set these via --set or a secure values file
  INTERNAL_STATE_API_KEY: ""
  DEFAULT_DATA_CLUSTER_API_KEY: ""
  DEFAULT_DATA2_CLUSTER_API_KEY: ""
  ADMIN_API_KEY: ""
  DATA_API_KEY: ""
  INTERNAL_QUERY_API_ADMIN_API_KEY: ""
  INTERNAL_QUERY_API_DATA_API_KEY: ""
  SCOPED_API_KEYS: ""
  # Optional OIDC/JWT bearer-token auth. API keys and scoped keys remain supported.
  OIDC_ENABLED: "false"
  OIDC_ISSUER: ""
  OIDC_AUDIENCE: ""
  OIDC_JWKS_URL: ""
  OIDC_PUBLIC_KEY: ""
  OIDC_ALGORITHMS: "RS256"
  OIDC_LEEWAY_SECONDS: "30"
  OIDC_SCOPE_CLAIMS: "scope,scp,roles,groups,realm_access.roles"
  OIDC_SCOPE_MAPPING: ""
  OIDC_SUBJECT_CLAIM: "sub"
  ALLOW_INSECURE_OIDC_URLS: "false" # Local-only escape hatch for non-HTTPS OIDC endpoints.
  AUTHZ_COLLECTION_POLICIES: ""
  AUTHZ_API_KEY_TENANT_BYPASS: "true"
  # Required when the Admin UI proxy injects server-side API keys in production.
  # Configure your authenticated ingress/gateway to set this header.
  ADMIN_UI_PROXY_TRUSTED_HEADER: ""
  ADMIN_UI_PROXY_TRUSTED_VALUE: ""
  # Optional browser OIDC login for the Admin UI. Uses Authorization Code + PKCE
  # and seals the resulting access token in an HttpOnly session cookie.
  ADMIN_UI_OIDC_ENABLED: "false"
  ADMIN_UI_OIDC_ISSUER: ""
  ADMIN_UI_OIDC_AUTHORIZATION_ENDPOINT: ""
  ADMIN_UI_OIDC_TOKEN_ENDPOINT: ""
  ADMIN_UI_OIDC_JWKS_URL: ""
  ADMIN_UI_OIDC_CLIENT_ID: ""
  ADMIN_UI_OIDC_CLIENT_SECRET: ""
  ADMIN_UI_OIDC_SCOPES: "openid profile email imposbro:admin imposbro:data"
  ADMIN_UI_OIDC_REDIRECT_URI: ""
  ADMIN_UI_OIDC_PROMPT: ""
  ADMIN_UI_SESSION_SECRET: ""
  ADMIN_UI_SESSION_TTL_SECONDS: "3600"
  ADMIN_UI_SESSION_COOKIE_NAME: "imposbro_admin_session"
