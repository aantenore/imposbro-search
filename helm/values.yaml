# values.yaml

# Global values
replicaCount: 1
imagePullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

# Configuration for the query-api service
queryApi:
  name: query-api
  # Required: set to an immutable image reference, never a mutable :latest tag.
  image: ""
  replicaCount: 1
  port: 8000
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  startupProbe:
    httpGet:
      path: /ready
      port: http
    failureThreshold: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

# Configuration for the admin-ui service
adminUi:
  name: admin-ui
  # Required: set to an immutable image reference, never a mutable :latest tag.
  image: ""
  replicaCount: 1
  port: 3000
  service:
    type: ClusterIP # Expose through an authenticated Ingress or gateway in production
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

# Configuration for the indexing-service (Kafka consumer)
indexingService:
  name: indexing-service
  # Required: set to an immutable image reference, never a mutable :latest tag.
  image: ""
  replicaCount: 1
  metrics:
    enabled: true
    port: 9108
    service:
      enabled: true
      type: ClusterIP
      port: 9108
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Workers do not expose an HTTP health endpoint by default.
  # Provide probes here if you wrap the worker with a process-level healthcheck.
  livenessProbe: {}

# Configuration for backend services (Kafka, Typesense, Redis)
# For a production setup, these should come from external Helm charts (as dependencies)
# or be managed services from your cloud provider.
kafka:
  name: kafka
  port: 9092

typesense:
  name: typesense
  port: 8108
  replica:
    name: typesense-replica
    port: 8108

redis:
  name: redis
  port: 6379

# Centralized configuration for environment variables.
# This chart deploys the IMPOSBRO applications only. Kafka, Redis, and
# Typesense must be deployed separately and provided here explicitly.
config:
  useSecret: false  # Must be true unless you customize external secret injection.
  KAFKA_BROKER_URL: ""
  KAFKA_TOPIC_PREFIX: "imposbro_search_sharded"
  KAFKA_METADATA_MAX_AGE_MS: "5000"
  INDEXING_MAX_PROCESSING_ATTEMPTS: "3"
  INDEXING_METRICS_ENABLED: "true"
  INDEXING_METRICS_PORT: "9108"
  REDIS_URL: ""
  CONFIG_SYNC_SOURCE_ID: "" # Optional; defaults to hostname:pid so replicas ignore only their own Redis notifications
  INTERNAL_STATE_NODES: ""
  DEFAULT_DATA_CLUSTER_NODES: ""
  DEFAULT_DATA2_CLUSTER_NODES: ""
  INTERNAL_QUERY_API_URL: ""
  CORS_ORIGINS: ""
  ALLOW_UNAUTHENTICATED_ADMIN: "false"
  ALLOW_UNAUTHENTICATED_DATA: "false"
  # For production: use Secrets (config.useSecret: true) and set these via --set or a secure values file
  INTERNAL_STATE_API_KEY: ""
  DEFAULT_DATA_CLUSTER_API_KEY: ""
  DEFAULT_DATA2_CLUSTER_API_KEY: ""
  ADMIN_API_KEY: ""
  DATA_API_KEY: ""
  INTERNAL_QUERY_API_ADMIN_API_KEY: ""
  INTERNAL_QUERY_API_DATA_API_KEY: ""
  SCOPED_API_KEYS: ""
  # Required when the Admin UI proxy injects server-side API keys in production.
  # Configure your authenticated ingress/gateway to set this header.
  ADMIN_UI_PROXY_TRUSTED_HEADER: ""
  ADMIN_UI_PROXY_TRUSTED_VALUE: ""
