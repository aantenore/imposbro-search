# values.yaml

# Global values
replicaCount: 1
imagePullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

# Configuration for the query-api service
queryApi:
  name: query-api
  image: "your-registry/imposbro-query-api:latest" # <-- IMPORTANT: Replace with your Docker image name
  replicaCount: 1
  port: 8000
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  startupProbe:
    httpGet:
      path: /ready
      port: http
    failureThreshold: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

# Configuration for the admin-ui service
adminUi:
  name: admin-ui
  image: "your-registry/imposbro-admin-ui:latest" # <-- IMPORTANT: Replace with your Docker image name
  replicaCount: 1
  port: 3000
  service:
    type: ClusterIP # Expose through an authenticated Ingress or gateway in production
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

# Configuration for the indexing-service (Kafka consumer)
indexingService:
  name: indexing-service
  image: "your-registry/imposbro-indexing-service:latest" # <-- IMPORTANT: Replace with your Docker image name
  replicaCount: 1
  metrics:
    enabled: true
    port: 9108
    service:
      enabled: true
      type: ClusterIP
      port: 9108
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Workers do not expose an HTTP health endpoint by default.
  # Provide probes here if you wrap the worker with a process-level healthcheck.
  livenessProbe: {}

# Configuration for backend services (Kafka, Typesense, Redis)
# For a production setup, these should come from external Helm charts (as dependencies)
# or be managed services from your cloud provider.
kafka:
  name: kafka
  port: 9092

typesense:
  name: typesense
  port: 8108
  replica:
    name: typesense-replica
    port: 8108

redis:
  name: redis
  port: 6379

# Centralized configuration for environment variables
# Non-sensitive values go to ConfigMap; sensitive ones to Secret when useSecret is true.
config:
  useSecret: false  # Set to true and provide secret.* values (e.g. via --set) to use a Secret for credentials
  KAFKA_BROKER_URL: "kafka:9092"
  KAFKA_TOPIC_PREFIX: "imposbro_search_sharded"
  KAFKA_METADATA_MAX_AGE_MS: "5000"
  INDEXING_MAX_PROCESSING_ATTEMPTS: "3"
  INDEXING_METRICS_ENABLED: "true"
  INDEXING_METRICS_PORT: "9108"
  REDIS_URL: "redis://redis:6379"
  INTERNAL_STATE_NODES: "typesense-state-1,typesense-state-2,typesense-state-3"
  DEFAULT_DATA_CLUSTER_NODES: "typesense-data-1,typesense-data-2,typesense-data-3"
  DEFAULT_DATA2_CLUSTER_NODES: ""
  INTERNAL_QUERY_API_URL: "http://query-api:80"
  CORS_ORIGINS: ""
  ALLOW_UNAUTHENTICATED_ADMIN: "false"
  ALLOW_UNAUTHENTICATED_DATA: "false"
  # For production: use Secrets (config.useSecret: true) and set these via --set or a secure values file
  INTERNAL_STATE_API_KEY: ""
  DEFAULT_DATA_CLUSTER_API_KEY: ""
  DEFAULT_DATA2_CLUSTER_API_KEY: ""
  ADMIN_API_KEY: ""
  DATA_API_KEY: ""
  INTERNAL_QUERY_API_ADMIN_API_KEY: ""
  INTERNAL_QUERY_API_DATA_API_KEY: ""
  SCOPED_API_KEYS: ""
