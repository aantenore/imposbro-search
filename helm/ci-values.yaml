# Values used only to validate Helm rendering in CI/local release gates.
queryApi:
  image: registry.example.com/imposbro-query-api@sha256:1111111111111111111111111111111111111111111111111111111111111111
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    hosts:
      - host: api.imposbro.example.com
        path: /
        pathType: Prefix
    tls:
      - secretName: imposbro-query-api-tls
        hosts:
          - api.imposbro.example.com
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: query-api

adminUi:
  image: registry.example.com/imposbro-admin-ui@sha256:2222222222222222222222222222222222222222222222222222222222222222
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/auth-url: https://auth.example.com/oauth2/auth
      nginx.ingress.kubernetes.io/auth-signin: https://auth.example.com/oauth2/start
    hosts:
      - host: admin.imposbro.example.com
        path: /
        pathType: Prefix
    tls:
      - secretName: imposbro-admin-ui-tls
        hosts:
          - admin.imposbro.example.com
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: admin-ui

indexingService:
  image: registry.example.com/imposbro-indexing-service@sha256:3333333333333333333333333333333333333333333333333333333333333333
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  keda:
    enabled: true
    minReplicaCount: 1
    maxReplicaCount: 5
    kafka:
      lagThreshold: "25"
      ensureEvenDistributionOfPartitions: "true"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: indexing-service

networkPolicy:
  enabled: true
  ingressController:
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: ingress-nginx
        podSelector:
          matchLabels:
            app.kubernetes.io/name: ingress-nginx
  prometheus:
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: monitoring
        podSelector:
          matchLabels:
            app.kubernetes.io/name: prometheus
  queryApi:
    health:
      from:
        - ipBlock:
            cidr: 10.0.0.0/8
  adminUi:
    health:
      from:
        - ipBlock:
            cidr: 10.0.0.0/8
  indexingService:
    health:
      ingress:
        from:
          - ipBlock:
              cidr: 10.0.0.0/8

monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus
  prometheusRule:
    enabled: true
    labels:
      release: prometheus

config:
  useSecret: true
  INDEXING_CHECKPOINT_BACKEND: memory
  INDEXING_CHECKPOINT_LOCK_TIMEOUT_MS: "5000"
  INDEXING_ALLOW_VOLATILE_CHECKPOINTS: "true"
  INDEXING_ALLOW_TYPESENSE_CHECKPOINTS: "false"
  KAFKA_BROKER_URL: kafka:9092
  REDIS_URL: redis://redis:6379
  INTERNAL_STATE_NODES: typesense-state-1,typesense-state-2,typesense-state-3
  DEFAULT_DATA_CLUSTER_NODES: typesense-data-1,typesense-data-2,typesense-data-3
  INTERNAL_QUERY_API_URL: http://imposbro-release-imposbro-search-query-api:80
  INTERNAL_STATE_API_KEY: test-state-key
  DEFAULT_DATA_CLUSTER_API_KEY: test-data-key
  ADMIN_API_KEY: test-admin-key
  INTERNAL_QUERY_API_ADMIN_API_KEY: test-admin-key
  DATA_API_KEY: test-data-key
  ADMIN_UI_PUBLIC_ORIGIN: https://admin.imposbro.example.com
  ADMIN_UI_SECURITY_PROFILE: development
  ADMIN_UI_SERVER_CREDENTIAL_MODE: trusted-header-legacy
  ADMIN_UI_ALLOW_LEGACY_TRUSTED_HEADER: "true"
  ADMIN_UI_PROXY_TRUSTED_HEADER: x-authenticated-user
  ADMIN_UI_PROXY_TRUSTED_VALUE: operator
