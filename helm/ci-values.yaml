# Values used only to validate Helm rendering in CI/local release gates.
queryApi:
  image: registry.example.com/imposbro-query-api:1.0.0
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    hosts:
      - host: api.imposbro.example.com
        path: /
        pathType: Prefix
    tls:
      - secretName: imposbro-query-api-tls
        hosts:
          - api.imposbro.example.com
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: query-api

adminUi:
  image: registry.example.com/imposbro-admin-ui:1.0.0
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/auth-url: https://auth.example.com/oauth2/auth
      nginx.ingress.kubernetes.io/auth-signin: https://auth.example.com/oauth2/start
    hosts:
      - host: admin.imposbro.example.com
        path: /
        pathType: Prefix
    tls:
      - secretName: imposbro-admin-ui-tls
        hosts:
          - admin.imposbro.example.com
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: admin-ui

indexingService:
  image: registry.example.com/imposbro-indexing-service:1.0.0
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  keda:
    enabled: true
    minReplicaCount: 1
    maxReplicaCount: 5
    kafka:
      lagThreshold: "25"
      ensureEvenDistributionOfPartitions: "true"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: indexing-service

networkPolicy:
  enabled: true
  ingressController:
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: ingress-nginx
        podSelector:
          matchLabels:
            app.kubernetes.io/name: ingress-nginx
  prometheus:
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: monitoring
        podSelector:
          matchLabels:
            app.kubernetes.io/name: prometheus

monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus
  prometheusRule:
    enabled: true
    labels:
      release: prometheus

config:
  useSecret: true
  KAFKA_BROKER_URL: kafka:9092
  REDIS_URL: redis://redis:6379
  INTERNAL_STATE_NODES: typesense-state-1,typesense-state-2,typesense-state-3
  DEFAULT_DATA_CLUSTER_NODES: typesense-data-1,typesense-data-2,typesense-data-3
  INTERNAL_QUERY_API_URL: http://query-api:80
  INTERNAL_STATE_API_KEY: test-state-key
  DEFAULT_DATA_CLUSTER_API_KEY: test-data-key
  ADMIN_API_KEY: test-admin-key
  DATA_API_KEY: test-data-key
  ADMIN_UI_PROXY_TRUSTED_HEADER: x-authenticated-user
