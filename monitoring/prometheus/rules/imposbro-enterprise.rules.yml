# Static enterprise recording and alert rules.
# Loading this file does not prove that metrics, Alertmanager routing, or paging work.
# Validate with promtool and execute the drills in docs/runbooks before production use.
groups:
  - name: imposbro.query-api.sli
    interval: 30s
    rules:
      - record: imposbro:query_api:request_rate_5m
        expr: |
          sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[5m]))

      - record: imposbro:query_api:availability_error_ratio_5m
        expr: |
          sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*",status="5xx"}[5m]))
          /
          clamp_min(sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[5m])), 0.000001)
      - record: imposbro:query_api:availability_error_ratio_30m
        expr: |
          sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*",status="5xx"}[30m]))
          /
          clamp_min(sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[30m])), 0.000001)
      - record: imposbro:query_api:availability_error_ratio_1h
        expr: |
          sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*",status="5xx"}[1h]))
          /
          clamp_min(sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[1h])), 0.000001)
      - record: imposbro:query_api:availability_error_ratio_2h
        expr: |
          sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*",status="5xx"}[2h]))
          /
          clamp_min(sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[2h])), 0.000001)
      - record: imposbro:query_api:availability_error_ratio_6h
        expr: |
          sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*",status="5xx"}[6h]))
          /
          clamp_min(sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[6h])), 0.000001)
      - record: imposbro:query_api:availability_error_ratio_1d
        expr: |
          sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*",status="5xx"}[1d]))
          /
          clamp_min(sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[1d])), 0.000001)
      - record: imposbro:query_api:availability_error_ratio_3d
        expr: |
          sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*",status="5xx"}[3d]))
          /
          clamp_min(sum(rate(http_requests_total{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[3d])), 0.000001)

      - record: imposbro:query_api:availability_burn_rate_5m
        expr: imposbro:query_api:availability_error_ratio_5m / 0.001
      - record: imposbro:query_api:availability_burn_rate_30m
        expr: imposbro:query_api:availability_error_ratio_30m / 0.001
      - record: imposbro:query_api:availability_burn_rate_1h
        expr: imposbro:query_api:availability_error_ratio_1h / 0.001
      - record: imposbro:query_api:availability_burn_rate_2h
        expr: imposbro:query_api:availability_error_ratio_2h / 0.001
      - record: imposbro:query_api:availability_burn_rate_6h
        expr: imposbro:query_api:availability_error_ratio_6h / 0.001
      - record: imposbro:query_api:availability_burn_rate_1d
        expr: imposbro:query_api:availability_error_ratio_1d / 0.001
      - record: imposbro:query_api:availability_burn_rate_3d
        expr: imposbro:query_api:availability_error_ratio_3d / 0.001

      - record: imposbro:query_api:latency_bad_ratio_5m
        expr: |
          clamp_min(
            1 - (
              sum(rate(http_request_duration_seconds_bucket{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*",le="1.0"}[5m]))
              /
              clamp_min(sum(rate(http_request_duration_seconds_count{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[5m])), 0.000001)
            ),
            0
          )
      - record: imposbro:query_api:latency_bad_ratio_30m
        expr: |
          clamp_min(
            1 - (
              sum(rate(http_request_duration_seconds_bucket{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*",le="1.0"}[30m]))
              /
              clamp_min(sum(rate(http_request_duration_seconds_count{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[30m])), 0.000001)
            ),
            0
          )
      - record: imposbro:query_api:latency_bad_ratio_1h
        expr: |
          clamp_min(
            1 - (
              sum(rate(http_request_duration_seconds_bucket{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*",le="1.0"}[1h]))
              /
              clamp_min(sum(rate(http_request_duration_seconds_count{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[1h])), 0.000001)
            ),
            0
          )
      - record: imposbro:query_api:latency_bad_ratio_2h
        expr: |
          clamp_min(
            1 - (
              sum(rate(http_request_duration_seconds_bucket{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*",le="1.0"}[2h]))
              /
              clamp_min(sum(rate(http_request_duration_seconds_count{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[2h])), 0.000001)
            ),
            0
          )
      - record: imposbro:query_api:latency_bad_ratio_6h
        expr: |
          clamp_min(
            1 - (
              sum(rate(http_request_duration_seconds_bucket{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*",le="1.0"}[6h]))
              /
              clamp_min(sum(rate(http_request_duration_seconds_count{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[6h])), 0.000001)
            ),
            0
          )
      - record: imposbro:query_api:latency_bad_ratio_1d
        expr: |
          clamp_min(
            1 - (
              sum(rate(http_request_duration_seconds_bucket{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*",le="1.0"}[1d]))
              /
              clamp_min(sum(rate(http_request_duration_seconds_count{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[1d])), 0.000001)
            ),
            0
          )
      - record: imposbro:query_api:latency_bad_ratio_3d
        expr: |
          clamp_min(
            1 - (
              sum(rate(http_request_duration_seconds_bucket{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*",le="1.0"}[3d]))
              /
              clamp_min(sum(rate(http_request_duration_seconds_count{job="imposbro_services",handler=~"(/api/v1)?/(search|documents|ingest)/.*"}[3d])), 0.000001)
            ),
            0
          )

      - record: imposbro:query_api:latency_burn_rate_5m
        expr: imposbro:query_api:latency_bad_ratio_5m / 0.01
      - record: imposbro:query_api:latency_burn_rate_30m
        expr: imposbro:query_api:latency_bad_ratio_30m / 0.01
      - record: imposbro:query_api:latency_burn_rate_1h
        expr: imposbro:query_api:latency_bad_ratio_1h / 0.01
      - record: imposbro:query_api:latency_burn_rate_2h
        expr: imposbro:query_api:latency_bad_ratio_2h / 0.01
      - record: imposbro:query_api:latency_burn_rate_6h
        expr: imposbro:query_api:latency_bad_ratio_6h / 0.01
      - record: imposbro:query_api:latency_burn_rate_1d
        expr: imposbro:query_api:latency_bad_ratio_1d / 0.01
      - record: imposbro:query_api:latency_burn_rate_3d
        expr: imposbro:query_api:latency_bad_ratio_3d / 0.01

      - record: imposbro:query_api:config_revision_gap
        expr: |
          clamp_min(
            imposbro_query_api_control_plane_authoritative_revision
            - imposbro_query_api_control_plane_applied_revision,
            0
          )

  # Time-sampled operational proxies. These catch sustained lag/convergence
  # risk, but they are not substitutes for retained per-event/per-revision SLI
  # history as documented in docs/SLO.md.
  - name: imposbro.pipeline.sli-proxies
    interval: 30s
    rules:
      - record: imposbro:outbox:oldest_unpublished_age_seconds
        expr: |
          clamp_min(
            max(imposbro_control_plane_outbox_oldest_unpublished_age_seconds)
            - max(imposbro_indexing_event_outbox_oldest_unpublished_age_seconds),
            0
          )
          + max(imposbro_indexing_event_outbox_oldest_unpublished_age_seconds)

      - record: imposbro:outbox:lag_bad_sample_ratio_5m
        expr: |
          avg_over_time(
            (imposbro:outbox:oldest_unpublished_age_seconds > bool 60)[5m:30s]
          )
      - record: imposbro:outbox:lag_bad_sample_ratio_30m
        expr: |
          avg_over_time(
            (imposbro:outbox:oldest_unpublished_age_seconds > bool 60)[30m:30s]
          )
      - record: imposbro:outbox:lag_bad_sample_ratio_1h
        expr: |
          avg_over_time(
            (imposbro:outbox:oldest_unpublished_age_seconds > bool 60)[1h:30s]
          )
      - record: imposbro:outbox:lag_bad_sample_ratio_6h
        expr: |
          avg_over_time(
            (imposbro:outbox:oldest_unpublished_age_seconds > bool 60)[6h:30s]
          )
      - record: imposbro:outbox:lag_burn_rate_5m
        expr: imposbro:outbox:lag_bad_sample_ratio_5m / 0.001
      - record: imposbro:outbox:lag_burn_rate_30m
        expr: imposbro:outbox:lag_bad_sample_ratio_30m / 0.001
      - record: imposbro:outbox:lag_burn_rate_1h
        expr: imposbro:outbox:lag_bad_sample_ratio_1h / 0.001
      - record: imposbro:outbox:lag_burn_rate_6h
        expr: imposbro:outbox:lag_bad_sample_ratio_6h / 0.001

      - record: imposbro:config:max_revision_gap
        expr: max(imposbro:query_api:config_revision_gap)
      - record: imposbro:config:stale_sample_ratio_5m
        expr: |
          avg_over_time((imposbro:config:max_revision_gap > bool 0)[5m:30s])
      - record: imposbro:config:stale_sample_ratio_30m
        expr: |
          avg_over_time((imposbro:config:max_revision_gap > bool 0)[30m:30s])
      - record: imposbro:config:stale_sample_ratio_1h
        expr: |
          avg_over_time((imposbro:config:max_revision_gap > bool 0)[1h:30s])
      - record: imposbro:config:stale_sample_ratio_6h
        expr: |
          avg_over_time((imposbro:config:max_revision_gap > bool 0)[6h:30s])
      - record: imposbro:config:stale_burn_rate_5m
        expr: imposbro:config:stale_sample_ratio_5m / 0.001
      - record: imposbro:config:stale_burn_rate_30m
        expr: imposbro:config:stale_sample_ratio_30m / 0.001
      - record: imposbro:config:stale_burn_rate_1h
        expr: imposbro:config:stale_sample_ratio_1h / 0.001
      - record: imposbro:config:stale_burn_rate_6h
        expr: imposbro:config:stale_sample_ratio_6h / 0.001

  - name: imposbro.query-api.alerts
    interval: 30s
    rules:
      - alert: ImposbroQueryApiTargetDown
        expr: up{job="imposbro_services"} == 0
        for: 2m
        labels:
          severity: critical
          notify: page
          service: query-api
        annotations:
          summary: Query API target is unavailable
          description: Prometheus has failed to scrape Query API instance {{ $labels.instance }} for at least 2 minutes.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/service-availability.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroQueryApiTargetMissing
        expr: absent(up{job="imposbro_services"})
        for: 10m
        labels:
          severity: critical
          notify: page
          service: query-api
        annotations:
          summary: Query API scrape target is missing
          description: Service discovery or Prometheus configuration exposes no Query API target.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/telemetry-missing.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroAvailabilityBudgetFastBurn
        expr: |
          (
            imposbro:query_api:availability_burn_rate_1h > 14.4
            and imposbro:query_api:availability_burn_rate_5m > 14.4
          )
          and imposbro:query_api:request_rate_5m > 0.05
        for: 2m
        labels:
          severity: critical
          notify: page
          service: query-api
          slo: availability
        annotations:
          summary: Query API availability error budget is burning rapidly
          description: Both the 5-minute and 1-hour windows exceed a 14.4x burn rate for the 99.9% availability SLO.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/query-api-slo-burn.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroAvailabilityBudgetSustainedBurn
        expr: |
          (
            imposbro:query_api:availability_burn_rate_6h > 6
            and imposbro:query_api:availability_burn_rate_30m > 6
          )
          and imposbro:query_api:request_rate_5m > 0.05
        for: 5m
        labels:
          severity: critical
          notify: page
          service: query-api
          slo: availability
        annotations:
          summary: Query API availability budget is burning persistently
          description: Both the 30-minute and 6-hour windows exceed a 6x burn rate for the 99.9% availability SLO.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/query-api-slo-burn.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroAvailabilityBudgetTicketBurn
        expr: |
          (
            imposbro:query_api:availability_burn_rate_1d > 3
            and imposbro:query_api:availability_burn_rate_2h > 3
          )
          or
          (
            imposbro:query_api:availability_burn_rate_3d > 1
            and imposbro:query_api:availability_burn_rate_6h > 1
          )
        for: 15m
        labels:
          severity: warning
          notify: ticket
          service: query-api
          slo: availability
        annotations:
          summary: Query API availability budget needs investigation
          description: Long and short windows agree that availability budget consumption is above the ticket threshold.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/query-api-slo-burn.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroLatencyBudgetFastBurn
        expr: |
          (
            imposbro:query_api:latency_burn_rate_1h > 14.4
            and imposbro:query_api:latency_burn_rate_5m > 14.4
          )
          and imposbro:query_api:request_rate_5m > 0.05
        for: 2m
        labels:
          severity: critical
          notify: page
          service: query-api
          slo: latency
        annotations:
          summary: Query API latency error budget is burning rapidly
          description: Both the 5-minute and 1-hour windows exceed a 14.4x burn rate for the 99% under 1 second latency SLO.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/query-api-slo-burn.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroLatencyBudgetSustainedBurn
        expr: |
          (
            imposbro:query_api:latency_burn_rate_6h > 6
            and imposbro:query_api:latency_burn_rate_30m > 6
          )
          and imposbro:query_api:request_rate_5m > 0.05
        for: 5m
        labels:
          severity: critical
          notify: page
          service: query-api
          slo: latency
        annotations:
          summary: Query API latency budget is burning persistently
          description: Both the 30-minute and 6-hour windows exceed a 6x burn rate.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/query-api-slo-burn.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroLatencyBudgetTicketBurn
        expr: |
          (
            imposbro:query_api:latency_burn_rate_1d > 3
            and imposbro:query_api:latency_burn_rate_2h > 3
          )
          or
          (
            imposbro:query_api:latency_burn_rate_3d > 1
            and imposbro:query_api:latency_burn_rate_6h > 1
          )
        for: 15m
        labels:
          severity: warning
          notify: ticket
          service: query-api
          slo: latency
        annotations:
          summary: Query API latency budget needs investigation
          description: Long and short windows agree that latency budget consumption is above the ticket threshold.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/query-api-slo-burn.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroQueryApiElevated5xxRatio
        expr: |
          imposbro:query_api:availability_error_ratio_5m > 0.02
          and imposbro:query_api:request_rate_5m > 0.05
        for: 10m
        labels:
          severity: warning
          notify: ticket
          service: query-api
        annotations:
          summary: Query API has an elevated 5xx response ratio
          description: More than 2% of in-scope data-plane requests have returned 5xx for 10 minutes.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/query-api-slo-burn.md
          dashboard_uid: imposbro-enterprise-sre

  - name: imposbro.pipeline.alerts
    interval: 30s
    rules:
      - alert: ImposbroIndexingWorkerNotReady
        expr: max(indexing_worker_ready{job="indexing_service"}) < 1
        for: 5m
        labels:
          severity: critical
          notify: page
          service: indexing-service
        annotations:
          summary: No indexing worker reports ready
          description: Cluster configuration or Kafka consumer readiness has been unavailable for 5 minutes.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/service-availability.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroIndexingDlqGrowth
        expr: sum(increase(indexing_dlq_messages_total{job="indexing_service"}[10m])) > 0
        for: 1m
        labels:
          severity: warning
          notify: ticket
          service: indexing-service
        annotations:
          summary: Indexing worker published a message to the DLQ
          description: At least one indexing event became a poison message in the last 10 minutes; inspect and disposition it before routing cutover.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/outbox-lag.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroIndexingConsumerLagSustained
        expr: sum(kafka_consumergroup_lag{job="imposbro_kafka",consumergroup="imposbro_federated_indexing_group"}) > 100
        for: 10m
        labels:
          severity: warning
          notify: ticket
          service: indexing-service
        annotations:
          summary: Primary indexing consumer lag is sustained
          description: The default IMPOSBRO indexing consumer group has exceeded 100 pending records for 10 minutes.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/outbox-lag.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroIndexingConsumerLagCritical
        expr: sum(kafka_consumergroup_lag{job="imposbro_kafka",consumergroup="imposbro_federated_indexing_group"}) > 1000
        for: 5m
        labels:
          severity: critical
          notify: page
          service: indexing-service
        annotations:
          summary: Primary indexing consumer lag is critical
          description: The default IMPOSBRO indexing consumer group has exceeded 1000 pending records for 5 minutes.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/outbox-lag.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroUnresolvedDlq
        expr: sum(kafka_consumergroup_lag{job="imposbro_kafka",consumergroup="imposbro_indexing_dlq_resolver"}) > 0
        for: 5m
        labels:
          severity: critical
          notify: page
          service: indexing-service
        annotations:
          summary: Indexing DLQ contains unresolved work
          description: The default DLQ resolver group has uncommitted records; routing cutover and completion must remain blocked.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/outbox-lag.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroIndexingOutboxBacklog
        expr: max(indexing_event_outbox_pending{job="imposbro_services"}) > 0
        for: 10m
        labels:
          severity: warning
          notify: ticket
          service: query-api
        annotations:
          summary: Durable indexing events remain unpublished
          description: At least one indexing event has remained pending for 10 minutes.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/outbox-lag.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroIndexingOutboxCritical
        expr: |
          max(indexing_event_outbox_pending{job="imposbro_services"}) > 100
          or max(imposbro_indexing_event_outbox_oldest_unpublished_age_seconds) > 300
          or sum(increase(indexing_event_outbox_replay_failures_total{job="imposbro_services"}[10m])) > 5
        for: 5m
        labels:
          severity: critical
          notify: page
          service: query-api
        annotations:
          summary: Indexing outbox delivery is critically delayed
          description: Backlog size, oldest-event age, or replay failures exceeded the critical threshold.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/outbox-lag.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroOutboxLagBudgetFastBurn
        expr: |
          imposbro:outbox:lag_burn_rate_1h > 14.4
          and imposbro:outbox:lag_burn_rate_5m > 14.4
        for: 2m
        labels:
          severity: critical
          notify: page
          service: delivery-pipeline
          slo: outbox-lag-proxy
        annotations:
          summary: Durable outbox lag proxy is burning rapidly
          description: Both the 5-minute and 1-hour sampled windows exceed a 14.4x burn rate for the 60-second outbox-age target.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/outbox-lag.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroOutboxLagBudgetSustainedBurn
        expr: |
          imposbro:outbox:lag_burn_rate_6h > 6
          and imposbro:outbox:lag_burn_rate_30m > 6
        for: 5m
        labels:
          severity: critical
          notify: page
          service: delivery-pipeline
          slo: outbox-lag-proxy
        annotations:
          summary: Durable outbox lag proxy is burning persistently
          description: Both the 30-minute and 6-hour sampled windows exceed a 6x burn rate for the 60-second outbox-age target.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/outbox-lag.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroControlPlaneOutboxLag
        expr: |
          max(imposbro_control_plane_outbox_oldest_unpublished_age_seconds) > 60
          or max(imposbro_control_plane_outbox_pending) > 10
        for: 5m
        labels:
          severity: warning
          notify: ticket
          service: control-plane
        annotations:
          summary: Control-plane outbox is not converging
          description: A durable configuration event is older than 60 seconds or more than 10 events are pending.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/outbox-lag.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroControlPlaneOutboxCritical
        expr: |
          max(imposbro_control_plane_outbox_oldest_unpublished_age_seconds) > 300
          or max(imposbro_control_plane_outbox_pending) > 100
        for: 5m
        labels:
          severity: critical
          notify: page
          service: control-plane
        annotations:
          summary: Control-plane outbox is critically delayed
          description: Configuration propagation has been delayed beyond the critical threshold.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/outbox-lag.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroConfigReplicaStale
        expr: max(imposbro:query_api:config_revision_gap) > 0
        for: 2m
        labels:
          severity: warning
          notify: ticket
          service: query-api
        annotations:
          summary: A Query API replica has stale control-plane configuration
          description: At least one replica has not applied the authoritative revision for 2 minutes.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/config-convergence.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroConfigReplicaStaleCritical
        expr: max(imposbro:query_api:config_revision_gap) > 0
        for: 10m
        labels:
          severity: critical
          notify: page
          service: query-api
        annotations:
          summary: Query API configuration convergence is critically delayed
          description: At least one replica has remained behind the authoritative revision for 10 minutes.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/config-convergence.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroConfigConvergenceBudgetFastBurn
        expr: |
          imposbro:config:stale_burn_rate_1h > 14.4
          and imposbro:config:stale_burn_rate_5m > 14.4
        for: 2m
        labels:
          severity: critical
          notify: page
          service: query-api
          slo: config-convergence-proxy
        annotations:
          summary: Configuration convergence proxy is burning rapidly
          description: Both the 5-minute and 1-hour sampled windows exceed a 14.4x burn rate because at least one replica is behind.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/config-convergence.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroConfigConvergenceBudgetSustainedBurn
        expr: |
          imposbro:config:stale_burn_rate_6h > 6
          and imposbro:config:stale_burn_rate_30m > 6
        for: 5m
        labels:
          severity: critical
          notify: page
          service: query-api
          slo: config-convergence-proxy
        annotations:
          summary: Configuration convergence proxy is burning persistently
          description: Both the 30-minute and 6-hour sampled windows exceed a 6x burn rate because replicas repeatedly or persistently lag.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/config-convergence.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroRoutingRolloutFailed
        expr: max(imposbro_routing_rollouts{phase="failed"}) > 0
        for: 1m
        labels:
          severity: critical
          notify: page
          service: routing-control-plane
        annotations:
          summary: A routing rollout entered the failed phase
          description: At least one persisted rollout is failed; preserve union coverage and begin the controlled diagnosis/rollback procedure.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/routing-rollout-failure.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroRoutingRollbackStalled
        expr: max(imposbro_routing_rollout_max_phase_age_seconds{phase="rolling_back"}) > 900
        for: 5m
        labels:
          severity: critical
          notify: page
          service: routing-control-plane
        annotations:
          summary: A routing rollback has stopped progressing
          description: The oldest rolling-back rollout has not persisted progress for more than 15 minutes.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/routing-rollout-failure.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroRoutingRollbackWindowElapsed
        expr: max(imposbro_routing_rollout_max_deadline_overrun_seconds{phase=~"cutover|drain"}) > 0
        for: 5m
        labels:
          severity: warning
          notify: ticket
          service: routing-control-plane
        annotations:
          summary: A cutover remains active beyond its rollback deadline
          description: A rollout in cutover or drain is past its recorded rollback deadline and requires an explicit completion or rollback decision.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/routing-rollout-failure.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroAuditDeliveryUnconfigured
        expr: |
          max(imposbro_audit_delivery_head_sequence) > 0
          and max(imposbro_audit_delivery_destinations) < 1
        for: 5m
        labels:
          severity: critical
          notify: page
          service: audit-delivery
        annotations:
          summary: Durable audit delivery has no registered destination
          description: Audit events exist but no provider-neutral delivery checkpoint is registered; source audit remains durable but external delivery is absent.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/audit-delivery.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroAuditDeliveryBacklog
        expr: max(imposbro_audit_delivery_max_backlog) > 0
        for: 10m
        labels:
          severity: warning
          notify: ticket
          service: audit-delivery
        annotations:
          summary: Durable audit export is behind the audit head
          description: At least one registered destination has not acknowledged every audit-chain event for 10 minutes.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/audit-delivery.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroAuditDeliveryFailure
        expr: |
          max(imposbro_audit_delivery_failed_destinations) > 0
          or max(imposbro_audit_delivery_max_failure_attempts) > 0
        for: 2m
        labels:
          severity: critical
          notify: page
          service: audit-delivery
        annotations:
          summary: Durable audit delivery is failing
          description: A registered destination has a redacted delivery failure and the retry checkpoint has not recovered.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/audit-delivery.md
          dashboard_uid: imposbro-enterprise-sre

      - alert: ImposbroEnterpriseTelemetryMissing
        expr: |
          absent(imposbro_query_api_control_plane_applied_revision)
          or absent(imposbro_control_plane_outbox_pending)
          or absent(imposbro_indexing_event_outbox_oldest_unpublished_age_seconds)
          or absent(indexing_worker_ready{job="indexing_service"})
          or absent(imposbro_routing_rollouts{phase="failed"})
          or absent(kafka_consumergroup_lag{job="imposbro_kafka",consumergroup="imposbro_federated_indexing_group"})
          or absent(kafka_consumergroup_lag{job="imposbro_kafka",consumergroup="imposbro_indexing_dlq_resolver"})
        for: 15m
        labels:
          severity: warning
          notify: ticket
          service: observability
        annotations:
          summary: Enterprise control-plane telemetry is incomplete
          description: Query, worker, PostgreSQL, or Kafka exporter metrics required for convergence, routing, outbox, and DLQ alerts are absent.
          runbook_url: https://github.com/aantenore/imposbro-search/blob/master/docs/runbooks/telemetry-missing.md
          dashboard_uid: imposbro-enterprise-sre
