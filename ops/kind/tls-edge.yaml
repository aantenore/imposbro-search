apiVersion: v1
kind: ConfigMap
metadata:
  name: kind-tls-edge
data:
  nginx.conf: |
    pid /tmp/nginx.pid;
    events {}
    http {
      access_log /dev/stdout;
      error_log /dev/stderr warn;
      server {
        listen 8443 ssl;
        server_name kind-api.imposbro.test;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_certificate /tls/tls.crt;
        ssl_certificate_key /tls/tls.key;
        location / {
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto https;
          proxy_pass http://imposbro-kind-imposbro-search-query-api:80;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kind-tls-edge
  labels: {app.kubernetes.io/name: kind-tls-edge}
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: kind-tls-edge}
  template:
    metadata:
      labels: {app.kubernetes.io/name: kind-tls-edge}
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      nodeSelector: {imposbro.dev/role: infra}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: nginx
          image: nginx:1.28-alpine@sha256:a8b39bd9cf0f83869a2162827a0caf6137ddf759d50a171451b335cecc87d236
          imagePullPolicy: IfNotPresent
          command: [/usr/sbin/nginx]
          args: [-c, /etc/nginx/nginx.conf, -g, "daemon off;"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
          ports: [{name: https, containerPort: 8443}]
          readinessProbe:
            httpGet: {scheme: HTTPS, path: /ready, port: https}
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 30
          livenessProbe:
            tcpSocket: {port: https}
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: {cpu: 25m, memory: 32Mi}
            limits: {cpu: 250m, memory: 128Mi}
          volumeMounts:
            - {name: config, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf, readOnly: true}
            - {name: tls, mountPath: /tls, readOnly: true}
            - {name: cache, mountPath: /var/cache/nginx}
            - {name: run, mountPath: /var/run}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: config
          configMap: {name: kind-tls-edge}
        - name: tls
          secret: {secretName: kind-edge-tls}
        - {name: cache, emptyDir: {sizeLimit: 32Mi}}
        - {name: run, emptyDir: {sizeLimit: 8Mi}}
        - {name: tmp, emptyDir: {sizeLimit: 8Mi}}
---
apiVersion: v1
kind: Service
metadata:
  name: kind-tls-edge
spec:
  selector: {app.kubernetes.io/name: kind-tls-edge}
  ports: [{name: https, port: 443, targetPort: https}]
