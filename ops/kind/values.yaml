imagePullPolicy: IfNotPresent

serviceAccount:
  create: true
  automountServiceAccountToken: false

podSecurityContext:
  runAsNonRoot: true
  seccompProfile: {type: RuntimeDefault}

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  privileged: false
  readOnlyRootFilesystem: true
  capabilities: {drop: [ALL]}

nodeSelector: {imposbro.dev/role: workload}

availability:
  podAntiAffinity:
    enabled: true
    type: required
    topologyKey: kubernetes.io/hostname

queryApi:
  replicaCount: 2
  minReadySeconds: 2
  podDisruptionBudget: {enabled: true, minAvailable: 1}
  ingress:
    enabled: true
    className: kind-smoke
    hosts:
      - {host: kind-api.imposbro.test, path: /, pathType: Prefix}
    tls:
      - {secretName: kind-edge-tls, hosts: [kind-api.imposbro.test]}
  topologySpreadConstraints:
    - maxSkew: 1
      minDomains: 2
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels: {app.kubernetes.io/component: query-api}

adminUi:
  replicaCount: 2
  minReadySeconds: 2
  podDisruptionBudget: {enabled: true, minAvailable: 1}
  ingress:
    enabled: true
    className: kind-smoke
    hosts:
      - {host: kind-admin.imposbro.test, path: /, pathType: Prefix}
    tls:
      - {secretName: kind-edge-tls, hosts: [kind-admin.imposbro.test]}
  topologySpreadConstraints:
    - maxSkew: 1
      minDomains: 2
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels: {app.kubernetes.io/component: admin-ui}

indexingService:
  replicaCount: 2
  minReadySeconds: 2
  podDisruptionBudget: {enabled: true, minAvailable: 1}
  metrics: {enabled: true, port: 9108, service: {enabled: true, type: ClusterIP, port: 9108}}
  topologySpreadConstraints:
    - maxSkew: 1
      minDomains: 2
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels: {app.kubernetes.io/component: indexing-service}

networkPolicy:
  enabled: true
  ingressController:
    from:
      - podSelector: {matchLabels: {app.kubernetes.io/name: kind-tls-edge}}
  queryApi:
    allowAdminUi: true
    allowIndexingService: true
    health:
      from: [{ipBlock: {cidr: 172.16.0.0/12}}]
    egress: &appEgress
      - to:
          - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: kube-system}}
            podSelector: {matchLabels: {k8s-app: kube-dns}}
        ports:
          - {protocol: UDP, port: 53}
          - {protocol: TCP, port: 53}
      - to: [{podSelector: {matchLabels: {imposbro.dev/tier: dependency}}}]
        ports:
          - {protocol: TCP, port: 5432}
          - {protocol: TCP, port: 6379}
          - {protocol: TCP, port: 8108}
          - {protocol: TCP, port: 29092}
      - to:
          - podSelector: {matchLabels: {app.kubernetes.io/component: query-api}}
        ports:
          - {protocol: TCP, port: 8000}
  adminUi:
    health:
      from: [{ipBlock: {cidr: 172.16.0.0/12}}]
    egress: *appEgress
  indexingService:
    health:
      ingress:
        from: [{ipBlock: {cidr: 172.16.0.0/12}}]
    egress: *appEgress

secrets:
  existingSecret: imposbro-kind-runtime
  providedKeys:
    - CONTROL_PLANE_DATABASE_URL
    - REDIS_URL
    - INTERNAL_STATE_API_KEY
    - DEFAULT_DATA_CLUSTER_API_KEY
    - DEFAULT_DATA2_CLUSTER_API_KEY
    - ADMIN_API_KEY
    - DATA_API_KEY
    - INTERNAL_QUERY_API_ADMIN_API_KEY
    - INTERNAL_QUERY_API_DATA_API_KEY
    - ADMIN_UI_SESSION_SECRET
  rolloutVersion: kind-live-v1

migrations:
  enabled: true
  lockTimeoutSeconds: 120

config:
  DEPLOYMENT_PROFILE: development
  LOG_FORMAT: json
  OTEL_SDK_DISABLED: "true"
  OTEL_TRACES_EXPORTER: none
  CONTROL_PLANE_STORE_BACKEND: postgres
  CONTROL_PLANE_RECONCILE_SECONDS: "1"
  INDEXING_EVENT_STORE_BACKEND: postgres
  INDEXING_OUTBOX_POLL_SECONDS: "0.25"
  INDEXING_OUTBOX_BATCH_SIZE: "100"
  INDEXING_CHECKPOINT_BACKEND: postgres
  INDEXING_CHECKPOINT_LOCK_TIMEOUT_MS: "5000"
  INDEXING_ALLOW_VOLATILE_CHECKPOINTS: "false"
  INDEXING_ALLOW_TYPESENSE_CHECKPOINTS: "false"
  PGSSLMODE: prefer
  KAFKA_BROKER_URL: kafka:29092
  KAFKA_SECURITY_PROTOCOL: PLAINTEXT
  KAFKA_SASL_MECHANISM: ""
  KAFKA_TOPIC_PREFIX: imposbro_kind
  KAFKA_METADATA_MAX_AGE_MS: "1000"
  INDEXING_MAX_PROCESSING_ATTEMPTS: "3"
  REDIS_URL: ""
  INTERNAL_STATE_NODES: typesense-a
  INTERNAL_STATE_PROTOCOL: http
  DEFAULT_DATA_CLUSTER_NODES: typesense-a
  DEFAULT_DATA_CLUSTER_PROTOCOL: http
  DEFAULT_DATA2_CLUSTER_NODES: typesense-b
  DEFAULT_DATA2_CLUSTER_PROTOCOL: http
  INTERNAL_QUERY_API_URL: http://imposbro-kind-imposbro-search-query-api:80
  CORS_ORIGINS: https://kind-admin.imposbro.test
  READINESS_POLICY: serving
  QUERY_API_HEALTH_CACHE_TTL_SECONDS: "0.25"
  QUERY_API_HEALTH_CHECK_BUDGET_SECONDS: "2"
  QUERY_API_HEALTH_DEPENDENCY_TIMEOUT_SECONDS: "1"
  QUERY_API_HEALTH_MAX_WORKERS: "8"
  ALLOW_UNAUTHENTICATED_ADMIN: "false"
  ALLOW_UNAUTHENTICATED_DATA: "false"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_BACKEND: redis
  RATE_LIMIT_FAIL_CLOSED: "true"
  RATE_LIMIT_SEARCH_REQUESTS: "1000"
  RATE_LIMIT_INGEST_REQUESTS: "1000"
  OIDC_ENABLED: "false"
  ADMIN_UI_PUBLIC_ORIGIN: https://kind-admin.imposbro.test
  ADMIN_UI_SECURITY_PROFILE: development
  ADMIN_UI_SERVER_CREDENTIAL_MODE: development
  ADMIN_UI_ENTERPRISE_MODE: "false"
