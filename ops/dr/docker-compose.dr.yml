name: ${DR_COMPOSE_PROJECT_NAME:-imposbro-dr-local}

x-postgres: &postgres
  image: postgres:17.5-alpine@sha256:6567bca8d7bc8c82c5922425a0baee57be8402df92bae5eacad5f01ae9544daa
  environment:
    POSTGRES_USER: imposbro
    POSTGRES_PASSWORD: ${DR_POSTGRES_PASSWORD:?DR_POSTGRES_PASSWORD is required}
    POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U imposbro -d $$POSTGRES_DB"]
    interval: 1s
    timeout: 3s
    retries: 45
  networks: [dr-isolated]

x-query-image: &query-image
  image: ${DR_QUERY_IMAGE:-imposbro-query-dr-local}
  build:
    context: ../../query_api
  networks: [dr-isolated]

services:
  source:
    <<: *postgres
    environment:
      POSTGRES_DB: imposbro_source
      POSTGRES_USER: imposbro
      POSTGRES_PASSWORD: ${DR_POSTGRES_PASSWORD:?DR_POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes: [source-data:/var/lib/postgresql/data]

  target:
    <<: *postgres
    environment:
      POSTGRES_DB: imposbro_restore
      POSTGRES_USER: imposbro
      POSTGRES_PASSWORD: ${DR_POSTGRES_PASSWORD:?DR_POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes: [target-data:/var/lib/postgresql/data]

  migrate-source:
    <<: *query-image
    command: ["python", "-m", "control_plane.migrate", "upgrade", "head"]
    environment:
      CONTROL_PLANE_DATABASE_URL: postgresql+psycopg://imposbro:${DR_POSTGRES_PASSWORD:?DR_POSTGRES_PASSWORD is required}@source:5432/imposbro_source
      CONTROL_PLANE_MIGRATION_LOCK_TIMEOUT_SECONDS: "45"
    depends_on:
      source:
        condition: service_healthy
    restart: "no"

  retention:
    <<: *query-image
    user: "${DR_HOST_UID:?DR_HOST_UID is required}:${DR_HOST_GID:?DR_HOST_GID is required}"
    entrypoint: ["python", "/ops/outbox_retention.py"]
    environment:
      HOME: /tmp
      RETENTION_DATABASE_URL: postgresql://imposbro:${DR_POSTGRES_PASSWORD:?DR_POSTGRES_PASSWORD is required}@source:5432/imposbro_source
    volumes:
      - ../../scripts/ops/outbox_retention.py:/ops/outbox_retention.py:ro
      - ${DR_WORK_DIR:?DR_WORK_DIR is required}:/evidence
    profiles: [tools]

  verify-source:
    <<: *query-image
    entrypoint: ["python", "/dr/verify-control-plane.py"]
    environment:
      CONTROL_PLANE_DATABASE_URL: postgresql+psycopg://imposbro:${DR_POSTGRES_PASSWORD:?DR_POSTGRES_PASSWORD is required}@source:5432/imposbro_source
    volumes:
      - ../../ops/dr:/dr:ro
    profiles: [tools]

  verify-target:
    <<: *query-image
    entrypoint: ["python", "/dr/verify-control-plane.py"]
    environment:
      CONTROL_PLANE_DATABASE_URL: postgresql+psycopg://imposbro:${DR_POSTGRES_PASSWORD:?DR_POSTGRES_PASSWORD is required}@target:5432/imposbro_restore
    volumes:
      - ../../ops/dr:/dr:ro
    profiles: [tools]

  tooling:
    image: ${DR_TOOLING_IMAGE:-imposbro-postgres-dr-tooling:local}
    build:
      context: ../..
      dockerfile: ops/dr/Dockerfile.tooling
    user: "${DR_HOST_UID:?DR_HOST_UID is required}:${DR_HOST_GID:?DR_HOST_GID is required}"
    environment:
      HOME: /tmp
      PGPASSWORD: ${DR_POSTGRES_PASSWORD:?DR_POSTGRES_PASSWORD is required}
    volumes:
      - ../../scripts/ops:/ops:ro
      - ../../ops/dr:/dr:ro
      - ${DR_WORK_DIR:?DR_WORK_DIR is required}:/evidence
    networks: [dr-isolated]
    profiles: [tools]

networks:
  dr-isolated:
    internal: true

volumes:
  source-data:
  target-data:
